name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.6.0'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        modules: 'qtmultimedia'
    
    - name: Configure CMake
      run: |
        cmake -B build `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
          -DBUILD_TESTS=ON `
          -DENABLE_ML=ON `
          -DENABLE_SIMD=ON
    
    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel
    
    - name: Test
      working-directory: build
      run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --parallel
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SoundBoostPro-Windows
        path: build/Release/*.exe

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build \
          qt6-base-dev qt6-multimedia-dev \
          libpulse-dev libasound2-dev \
          libpipewire-0.3-dev \
          libgtest-dev nlohmann-json3-dev
    
    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DBUILD_TESTS=ON \
          -DENABLE_ML=ON \
          -DENABLE_SIMD=ON
    
    - name: Build
      run: cmake --build build --parallel
    
    - name: Test
      working-directory: build
      run: ctest --output-on-failure --parallel
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SoundBoostPro-Linux
        path: build/SoundBoostPro

  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        modules: 'qtmultimedia'
    
    - name: Install dependencies
      run: brew install cmake ninja nlohmann-json googletest
    
    - name: Configure CMake
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DBUILD_TESTS=ON \
          -DENABLE_ML=ON \
          -DENABLE_SIMD=ON
    
    - name: Build
      run: cmake --build build --parallel
    
    - name: Test
      working-directory: build
      run: ctest --output-on-failure --parallel
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SoundBoostPro-macOS
        path: build/SoundBoostPro.app

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy clang-format
    
    - name: Check formatting
      run: |
        find src -name "*.cpp" -o -name "*.hpp" | xargs clang-format --dry-run --Werror
    
    - name: Run clang-tidy
      run: |
        cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        find src -name "*.cpp" | head -5 | xargs clang-tidy -p build || true
